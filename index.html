<!DOCTYPE html>
  <html lang="ko">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VOC 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
  </head>
  <body class="bg-gray-50 min-h-screen">

  <main class="max-w-6xl mx-auto p-6">

    <header class="flex justify-between items-end mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">
          VOC 대시보드
        </h1>
        <p class="text-sm text-gray-500 mt-1">
          고객의 소리 자동 분류·분석
        </p>
      </div>
      <div class="text-sm text-gray-600">
        총 분류
        <span id="totalCount"
              class="font-bold text-blue-600">--</span>건
      </div>
    </header>

    <div id="loading"
         class="text-center py-20 text-gray-500">
      데이터 불러오는 중...
    </div>

    <div id="content" class="hidden space-y-6">

      <section class="bg-white rounded-xl shadow-sm p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold text-gray-800">
            VOC 유입 추이
          </h2>
          <div class="flex gap-2" id="periodTabs">
            <button data-p="day"
              class="period-btn px-3 py-1 text-sm rounded-full bg-blue-600 text-white">
              일별
            </button>
            <button data-p="week"
              class="period-btn px-3 py-1 text-sm rounded-full bg-gray-200 text-gray-700">
              주별
            </button>
            <button data-p="month"
              class="period-btn px-3 py-1 text-sm rounded-full bg-gray-200 text-gray-700">
              월별
            </button>
          </div>
        </div>
        <div class="h-72">
          <canvas id="trendChart"></canvas>
        </div>
      </section>

      <div class="grid md:grid-cols-2 gap-6">

        <section class="bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">
            Top 10 키워드
          </h2>
          <table class="w-full text-sm">
            <thead class="text-gray-500 border-b">
              <tr>
                <th class="text-left py-2 font-medium">
                  키워드
                </th>
                <th class="text-right py-2 font-medium">
                  건수
                </th>
              </tr>
            </thead>
            <tbody id="kwTable"></tbody>
          </table>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">
            개선안 초안
          </h2>
          <div id="hintList" class="space-y-3 text-sm">
          </div>
        </section>

      </div>
    </div>

    <div id="error"
         class="hidden text-center py-20 text-red-500">
    </div>

  </main>

  <script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzwiIAXNT7ImJxngRbWT-HO3Rd_sxxTgG1exKtW8Q2THy0_D4_GFO1XCi20aDR8je9Www/exec";

  let allData = null;
  let currentPeriod = "day";
  let chart = null;

  async function loadData() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error("API 응답 오류");
      allData = await res.json();
      if (allData.error) throw new Error(allData.error);

      document.getElementById("loading").classList.add("hidden");
      document.getElementById("content").classList.remove("hidden");
      document.getElementById("totalCount").textContent = allData.totalCount;

      renderKeywords();
      renderHints();
      drawChart();
    } catch (err) {
      document.getElementById("loading").classList.add("hidden");
      const errEl = document.getElementById("error");
      errEl.classList.remove("hidden");
      errEl.textContent = "오류: " + err.message;
    }
  }

  document.getElementById("periodTabs").addEventListener("click", (e) => {
    if (!e.target.dataset.p) return;
    currentPeriod = e.target.dataset.p;
    document.querySelectorAll(".period-btn").forEach((b) => {
      b.classList.remove("bg-blue-600", "text-white");
      b.classList.add("bg-gray-200", "text-gray-700");
    });
    e.target.classList.remove("bg-gray-200", "text-gray-700");
    e.target.classList.add("bg-blue-600", "text-white");
    drawChart();
  });

  function drawChart() {
    const data = allData.byPeriod[currentPeriod];
    const keys = Object.keys(data).sort();
    const counts = keys.map((k) => data[k].total);

    if (chart) chart.destroy();
    const ctx = document.getElementById("trendChart").getContext("2d");
    chart = new Chart(ctx, {
      type: currentPeriod === "day" ? "line" : "bar",
      data: {
        labels: keys,
        datasets: [{
          label: "VOC 건수",
          data: counts,
          borderColor: "#2563eb",
          backgroundColor: currentPeriod === "day"
            ? "rgba(37, 99, 235, 0.1)"
            : "#93c5fd",
          fill: currentPeriod === "day",
          tension: 0.3,
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
      },
    });
  }

  function renderKeywords() {
    document.getElementById("kwTable").innerHTML =
      allData.topKeywords.map(([kw, n]) =>
        `<tr class="border-b border-gray-100">
          <td class="py-2">${kw}</td>
          <td class="py-2 text-right font-semibold text-blue-600">${n}</td>
        </tr>`
      ).join("");
  }

  function renderHints() {
    document.getElementById("hintList").innerHTML =
      allData.topHints.slice(0, 8).map((h) =>
        `<div class="border-l-4 border-blue-500 pl-3">
          <div class="text-xs font-semibold text-blue-600">
            ${h.category}
          </div>
          <div class="text-gray-800 mt-1">
            ${h.hint}
          </div>
        </div>`
      ).join("");
  }

  loadData();
  </script>

  </body>
  </html>

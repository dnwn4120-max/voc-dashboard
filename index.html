<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VOC 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --c-bg: #ffffff;
    --c-surface: #ffffff;
    --c-border: #f0f0f0;
    --c-text: #4a4a4a;
    --c-text-strong: #1a1a1a;
    --c-accent: #3b82f6;
    --c-accent-light: rgba(59,130,246,0.08);
    --c-accent-mid: rgba(59,130,246,0.15);
    --c-muted: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    -webkit-font-smoothing: antialiased;
  }

  /* subtle fade-in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up {
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }
  .fade-up:nth-child(1) { animation-delay: 0.05s; }
  .fade-up:nth-child(2) { animation-delay: 0.12s; }
  .fade-up:nth-child(3) { animation-delay: 0.19s; }
  .fade-up:nth-child(4) { animation-delay: 0.26s; }

  /* card */
  .card {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 14px;
    padding: 28px 30px;
  }

  /* period tabs */
  .period-btn {
    font-size: 13px;
    padding: 5px 16px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    background: transparent;
    color: var(--c-muted);
  }
  .period-btn.active {
    background: var(--c-accent);
    color: #fff;
  }
  .period-btn:not(.active):hover {
    background: var(--c-accent-light);
    color: var(--c-accent);
  }

  /* section title */
  .sec-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--c-text-strong);
    letter-spacing: -0.02em;
  }
  .sec-sub {
    font-size: 12px;
    color: var(--c-muted);
    margin-top: 2px;
  }

  /* improvement cards */
  .improve-card {
    border-left: 3px solid var(--c-accent);
    padding: 20px 22px;
    background: var(--c-accent-light);
    border-radius: 0 10px 10px 0;
    transition: background 0.2s;
  }
  .improve-card:hover { background: var(--c-accent-mid); }
  .improve-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--c-accent);
    margin-bottom: 6px;
  }
  .improve-body {
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--c-text);
  }
  .improve-body strong { color: var(--c-text-strong); font-weight: 700; }

  /* briefing insight line */
  .insight-line {
    font-size: 12.5px;
    color: var(--c-text);
    line-height: 1.5;
    padding: 8px 12px;
    background: var(--c-accent-light);
    border-radius: 6px;
    margin-top: 10px;
  }
  .insight-line::before {
    content: "📌 ";
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  /* chart canvas wrappers */
  .chart-wrap { position: relative; width: 100%; }
</style>
</head>
<body>

<main class="max-w-[1100px] mx-auto px-6 py-10">

  <!-- ======== HEADER ======== -->
  <header class="flex justify-between items-end mb-10 fade-up">
    <div>
      <p class="text-xs tracking-widest uppercase text-gray-400 mb-1">Weekly Auto-Report</p>
      <h1 class="text-[26px] font-extrabold tracking-tight" style="color:var(--c-text-strong)">
        VOC 대시보드
      </h1>
      <p class="text-sm mt-1" style="color:var(--c-muted)">
        고객의 소리 자동 분류 · 분석 · 개선안 도출
      </p>
    </div>
    <div class="text-right">
      <div class="text-xs" style="color:var(--c-muted)">총 분류</div>
      <span id="totalCount" class="text-2xl font-bold" style="color:var(--c-accent)">--</span>
      <span class="text-sm" style="color:var(--c-muted)">건</span>
    </div>
  </header>

  <!-- ======== LOADING / ERROR ======== -->
  <div id="loading" class="text-center py-24" style="color:var(--c-muted)">
    <svg class="animate-spin mx-auto mb-3" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
    데이터를 불러오고 있습니다…
  </div>
  <div id="error" class="hidden text-center py-24 text-red-400 text-sm"></div>

  <!-- ======== CONTENT ======== -->
  <div id="content" class="hidden space-y-8">

    <!-- ── 1. VOC 유입 추이 ── -->
    <section class="card fade-up">
      <div class="flex justify-between items-center mb-5">
        <div>
          <h2 class="sec-title">VOC 유입 추이</h2>
          <p class="sec-sub">기간별 VOC 접수 건수</p>
        </div>
        <div class="flex gap-1" id="periodTabs">
          <button data-p="day"  class="period-btn active">일별</button>
          <button data-p="week" class="period-btn">주별</button>
          <button data-p="month" class="period-btn">월별</button>
        </div>
      </div>
      <div class="chart-wrap" style="height:280px">
        <canvas id="trendChart"></canvas>
      </div>
    </section>

    <!-- ── 2. BRIEFING + 개선안 (Z-flow: 좌→우) ── -->
    <div class="grid md:grid-cols-2 gap-6">

      <!-- LEFT: 브리핑 -->
      <section class="card fade-up">
        <h2 class="sec-title mb-1">브리핑</h2>
        <p class="sec-sub mb-5">문의 유형 · 클래스 · 반 · 멘토별 VOC 분포</p>

        <div style="display:flex;flex-direction:column;gap:31px" id="briefingArea">
          <!-- filled by JS -->
        </div>
      </section>

      <!-- RIGHT: 개선안 초안 -->
      <section class="card fade-up">
        <h2 class="sec-title mb-1">개선안 초안</h2>
        <p class="sec-sub mb-5"></p>

        <div id="improveList" class="space-y-5">
          <!-- filled by JS -->
        </div>
      </section>

    </div>
  </div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzwiIAXNT7ImJxngRbWT-HO3Rd_sxxTgG1exKtW8Q2THy0_D4_GFO1XCi20aDR8je9Www/exec";

let allData = null;
let currentPeriod = "day";
let trendChart = null;
let briefingCharts = [];

/* ── helpers ── */
// Returns [normalPart, boldPart] for x-axis labels
function fmtLabelParts(key, period) {
  if (period === "day") {
    const d = new Date(key);
    if (!isNaN(d)) {
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return [`${d.getFullYear()}.${mm}.${dd} -`, `${hh}:${mi}`];
    }
    return [key.replace(/-/g,'.'), ''];
  }
  if (period === "week") {
    const wMatch = key.match(/^(\d{4})-W(\d+)$/);
    if (wMatch) {
      const yr = wMatch[1];
      const wn = parseInt(wMatch[2], 10);
      const approxMonth = Math.min(12, Math.ceil(wn * 7 / 30.44));
      const weekInMonth = Math.ceil(wn - (approxMonth-1)*4.35);
      return [yr, `${approxMonth}월 ${weekInMonth}주차`];
    }
    const d2 = new Date(key);
    if (!isNaN(d2)) {
      const m = d2.getMonth() + 1;
      const weekOfMonth = Math.ceil(d2.getDate() / 7);
      return [String(d2.getFullYear()), `${m}월 ${weekOfMonth}주차`];
    }
    return [key, ''];
  }
  if (period === "month") {
    const mMatch = key.match(/^(\d{4})-(\d{2})$/);
    if (mMatch) return [mMatch[1] + '.', `${parseInt(mMatch[2],10)}월`];
    const d3 = new Date(key);
    if (!isNaN(d3)) return [d3.getFullYear() + '.', `${d3.getMonth()+1}월`];
    return [key, ''];
  }
  return [key, ''];
}
// Multiline label array for Chart.js (line1=normal, line2=bold)
function fmtLabel(key, period) {
  const [a, b] = fmtLabelParts(key, period);
  return b ? [a, b] : [a];
}

const BLUE  = '#3b82f6';
const BLUE_LIGHT = 'rgba(59,130,246,0.10)';
const BLUE_MID   = 'rgba(59,130,246,0.55)';

function chartOpts(aspectRatio) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 10, family: 'Pretendard' }, color: '#aaa' } },
      y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 }, color: '#bbb' }, grid: { color: '#f5f5f5' } }
    }
  };
}

/* ── trend chart ── */
function drawTrend() {
  const data = allData.byPeriod[currentPeriod];
  const keys = Object.keys(data).sort();
  const labels = keys.map(k => fmtLabel(k, currentPeriod));
  const counts = keys.map(k => data[k].total);

  if (trendChart) trendChart.destroy();
  const ctx = document.getElementById("trendChart").getContext("2d");
  trendChart = new Chart(ctx, {
    type: currentPeriod === "day" ? "line" : "bar",
    data: {
      labels,
      datasets: [{
        label: "VOC 건수",
        data: counts,
        borderColor: BLUE,
        backgroundColor: currentPeriod === "day" ? BLUE_LIGHT : BLUE_MID,
        fill: currentPeriod === "day",
        tension: 0.35,
        borderWidth: 2,
        borderRadius: currentPeriod !== "day" ? 6 : 0,
        pointRadius: currentPeriod === "day" ? 3 : 0,
        pointBackgroundColor: BLUE,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { bottom: 28 } },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            display: false  // hide default labels entirely
          }
        },
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 }, color: '#bbb' }, grid: { color: '#f5f5f5' } }
      },
      plugins: {
        legend: { display: false }
      }
    },
    plugins: [{
      id: 'boldXLine',
      afterDraw(chart) {
        const xAxis = chart.scales.x;
        if (!xAxis) return;
        const c = chart.ctx;
        const labelArr = chart.data.labels;
        const tickCount = xAxis.ticks.length;
        // Auto-skip: if many ticks, only show every Nth
        const maxVisible = Math.floor(chart.width / 80);
        const skip = tickCount > maxVisible ? Math.ceil(tickCount / maxVisible) : 1;

        xAxis.ticks.forEach((tick, i) => {
          if (i % skip !== 0) return;
          const label = labelArr[tick.value != null ? tick.value : i];
          if (!label) return;
          const x = xAxis.getPixelForTick(i);
          const yBase = xAxis.bottom + 12;
          c.save();
          c.textAlign = 'center';
          if (Array.isArray(label) && label.length >= 2) {
            // Line 1: normal (date part)
            c.fillStyle = '#aaa';
            c.font = '10px Pretendard';
            c.fillText(label[0], x, yBase);
            // Line 2: bold (time/week/month part)
            c.font = 'bold 10px Pretendard';
            c.fillStyle = '#1a1a1a';
            c.fillText(label[1], x, yBase + 14);
          } else {
            const txt = Array.isArray(label) ? label[0] : label;
            c.fillStyle = '#aaa';
            c.font = '10px Pretendard';
            c.fillText(txt, x, yBase);
          }
          c.restore();
        });
      }
    }]
  });
}

/* ── briefing ── */
function renderBriefing() {
  const container = document.getElementById("briefingArea");
  container.innerHTML = "";

  // Destroy old charts
  briefingCharts.forEach(c => c.destroy());
  briefingCharts = [];

  // We pull category-level breakdowns from allData
  // The API returns byPeriod[period][dateKey].categories
  // Aggregate across all date-keys for current period
  const periodData = allData.byPeriod[currentPeriod];
  const dateKeys = Object.keys(periodData).sort();

  // We need to build per-dimension aggregates
  // Dimensions expected: 문의유형(category), 클래스(class), 반(group/ban), 멘토(mentor)
  // The API likely stores categories; we'll derive what we can
  const dims = [
    { key: "category", label: "문의 유형", type: "horizontal-bar" },
    { key: "class",    label: "클래스",    type: "horizontal-bar" },
    { key: "ban",      label: "반",        type: "bar" },
    { key: "mentor",   label: "멘토",      type: "horizontal-bar" },
  ];

  // Try extracting from allData; adapt to actual shape
  // If allData has a "briefing" key, use it; otherwise derive from topKeywords / byPeriod
  const briefing = allData.briefing || null;

  dims.forEach((dim, idx) => {
    const wrapper = document.createElement("div");

    let items = {}; // { label: count }
    let insightText = "";

    if (briefing && briefing[dim.key]) {
      const bd = briefing[dim.key];
      items = bd.counts || {};
      insightText = bd.insight || "";
    } else {
      // Fallback: try to use category data from byPeriod
      if (dim.key === "category") {
        dateKeys.forEach(dk => {
          const cats = periodData[dk].categories;
          if (cats) {
            Object.entries(cats).forEach(([c, n]) => {
              items[c] = (items[c] || 0) + n;
            });
          }
        });
      }
      // If still empty, derive from topKeywords as placeholder
      if (Object.keys(items).length === 0 && allData.topKeywords) {
        const slice = allData.topKeywords.slice(
          idx * 3, idx * 3 + 4
        );
        slice.forEach(([kw, n]) => { items[kw] = n; });
      }
    }

    const labels = Object.keys(items);
    const values = Object.values(items);

    if (labels.length === 0) return;

    // Find the max value index for bold highlighting
    const maxVal = Math.max(...values);
    const maxIdx = values.indexOf(maxVal);
    const maxLabel = labels[maxIdx];

    // Determine insight - bold the top item name + full text
    if (!insightText && labels.length > 0) {
      insightText = `<strong>${dim.label} 기준, '${maxLabel}'이(가) ${maxVal}건으로 가장 높은 비중을 차지합니다.</strong>`;
    } else if (insightText) {
      // Bold the entire insight line since it references the top issue
      insightText = `<strong>${insightText}</strong>`;
    }

    const isHorizontal = dim.type === "horizontal-bar";
    const canvasH = Math.max(100, labels.length * 28 + 20);

    wrapper.innerHTML = `
      <div class="text-xs font-semibold mb-2" style="color:var(--c-text-strong)">${dim.label}</div>
      <div class="chart-wrap" style="height:${isHorizontal ? canvasH : 120}px">
        <canvas id="briefChart${idx}"></canvas>
      </div>
      ${insightText ? `<div class="insight-line">${insightText}</div>` : ''}
    `;
    container.appendChild(wrapper);

    // Highlight the max bar with solid blue, others lighter
    const bgColors = values.map((v, i) => i === maxIdx ? BLUE : BLUE_MID);

    const ctx = document.getElementById(`briefChart${idx}`).getContext("2d");
    const c = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: bgColors,
          borderRadius: 4,
          barThickness: isHorizontal ? 14 : undefined,
          maxBarThickness: 22,
        }]
      },
      options: {
        indexAxis: isHorizontal ? "y" : "x",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
        },
        scales: {
          x: {
            beginAtZero: true,
            grid: { color: '#f5f5f5' },
            ticks: { font: { size: 10, family: 'Pretendard' }, color: '#aaa', stepSize: 1 }
          },
          y: {
            grid: { display: false },
            ticks: { font: { size: 11, family: 'Pretendard' }, color: '#666' }
          }
        }
      }
    });
    briefingCharts.push(c);
  });
}

/* ── 개선안 ── */
function renderImprovements() {
  const el = document.getElementById("improveList");

  // allData.topHints contains improvement hints from API
  // We take top 3 and structure them
  const hints = allData.topHints || [];
  const items = hints.slice(0, 3);

  if (items.length === 0) {
    el.innerHTML = '<p class="text-sm text-gray-400">개선안 데이터가 없습니다.</p>';
    return;
  }

  el.innerHTML = items.map((h, i) => {
    const hintRaw = h.hint || "";
    // Split multiple proposals by newline or circled numbers
    const hintText = hintRaw
      .replace(/\n\s*/g, '')  // remove newlines (circled numbers handle line breaks)
      .replace(/(②|③|④|⑤)/g, '<br style="display:block;margin-top:6px;">$1');

    // Build data-backed context from category counts
    const periodData = allData.byPeriod[currentPeriod];
    const dateKeys = Object.keys(periodData).sort();
    let catCount = 0;
    dateKeys.forEach(dk => {
      const cats = periodData[dk].categories;
      if (cats && cats[h.category]) catCount += cats[h.category];
    });
    const pct = allData.totalCount > 0
      ? Math.round(catCount / allData.totalCount * 100)
      : 0;

    const currentStatus = catCount > 0
      ? `'${h.category}' 관련 VOC ${catCount}건 (전체 ${pct}%) 접수.`
      : `'${h.category}' 관련 반복 문의가 지속적으로 발생하고 있습니다.`;

    const effectiveness = `해당 개선을 통해 '${h.category}' 유형의 VOC를 선제적으로 줄여, 운영 리스크를 낮추고 교육 품질 안정성을 확보할 수 있습니다.`;

    return `
      <div class="improve-card">
        <div class="improve-label">개선안 ${i+1}</div>
        <div class="improve-body">
          <div class="mb-2">
            <strong>현황</strong><br>
            ${currentStatus}
          </div>
          <div class="mb-2">
            <strong>개선안</strong><br>
            ${hintText}
          </div>
          <div>
            <strong>기대 효과</strong><br>
            ${effectiveness}
          </div>
        </div>
      </div>
    `;
  }).join("");
}

/* ── period tab toggle ── */
document.getElementById("periodTabs").addEventListener("click", (e) => {
  const btn = e.target.closest(".period-btn");
  if (!btn || !btn.dataset.p) return;
  currentPeriod = btn.dataset.p;
  document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  drawTrend();
  renderBriefing();
});

/* ── sample data (fallback) ── */
function getSampleData() {
  const days = {};
  const base = new Date("2025-07-07");
  for (let i = 0; i < 14; i++) {
    const d = new Date(base); d.setDate(base.getDate() + i);
    const key = d.toISOString().slice(0,10);
    const total = Math.floor(Math.random()*12)+3;
    days[key] = {
      total,
      categories: {
        "수강 문의": Math.floor(total*0.3),
        "콘텐츠 오류": Math.floor(total*0.2),
        "결제/환불": Math.floor(total*0.18),
        "시스템 장애": Math.floor(total*0.15),
        "멘토링 불만": Math.floor(total*0.1),
        "기타": Math.ceil(total*0.07),
      }
    };
  }
  const weeks = {};
  ["2025-W27","2025-W28","2025-W29","2025-W30"].forEach((w,i) => {
    const total = [34,41,28,37][i];
    weeks[w] = {
      total,
      categories: {
        "수강 문의": Math.floor(total*0.28),
        "콘텐츠 오류": Math.floor(total*0.22),
        "결제/환불": Math.floor(total*0.18),
        "시스템 장애": Math.floor(total*0.15),
        "멘토링 불만": Math.floor(total*0.1),
        "기타": Math.ceil(total*0.07),
      }
    };
  });
  const months = {};
  ["2025-04","2025-05","2025-06","2025-07"].forEach((m,i) => {
    const total = [98,127,112,140][i];
    months[m] = {
      total,
      categories: {
        "수강 문의": Math.floor(total*0.28),
        "콘텐츠 오류": Math.floor(total*0.22),
        "결제/환불": Math.floor(total*0.18),
        "시스템 장애": Math.floor(total*0.15),
        "멘토링 불만": Math.floor(total*0.1),
        "기타": Math.ceil(total*0.07),
      }
    };
  });

  return {
    totalCount: 140,
    byPeriod: { day: days, week: weeks, month: months },
    briefing: {
      category: {
        counts: { "수강 문의": 39, "콘텐츠 오류": 31, "결제/환불": 25, "시스템 장애": 21, "멘토링 불만": 14, "기타": 10 },
        insight: "'수강 문의'가 전체 VOC의 28%로 가장 높은 비중을 차지하며, 수강 신청 프로세스 점검이 필요합니다."

async function loadData() {
  try {
    const res = await fetch(API_URL, { redirect: "follow" });
    if (!res.ok) throw new Error("API 응답 오류");
    allData = await res.json();
    if (allData.error) throw new Error(allData.error);
  } catch (err) {
    console.warn("API 호출 실패, 샘플 데이터로 대체합니다:", err.message);
    allData = getSampleData();
  }

  document.getElementById("loading").classList.add("hidden");
  document.getElementById("content").classList.remove("hidden");
  document.getElementById("totalCount").textContent = allData.totalCount;

  drawTrend();
  renderBriefing();
  renderImprovements();
}

loadData();

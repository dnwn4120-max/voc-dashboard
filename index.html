<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VOC 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --c-bg: #ffffff;
    --c-surface: #ffffff;
    --c-border: #f0f0f0;
    --c-text: #4a4a4a;
    --c-text-strong: #1a1a1a;
    --c-accent: #3b82f6;
    --c-accent-light: rgba(59,130,246,0.08);
    --c-accent-mid: rgba(59,130,246,0.15);
    --c-muted: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    -webkit-font-smoothing: antialiased;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up {
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }
  .fade-up:nth-child(1) { animation-delay: 0.05s; }
  .fade-up:nth-child(2) { animation-delay: 0.12s; }
  .fade-up:nth-child(3) { animation-delay: 0.19s; }
  .fade-up:nth-child(4) { animation-delay: 0.26s; }
  .card {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 14px;
    padding: 28px 30px;
  }
  .period-btn {
    font-size: 13px;
    padding: 5px 16px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    background: transparent;
    color: var(--c-muted);
  }
  .period-btn.active {
    background: var(--c-accent);
    color: #fff;
  }
  .period-btn:not(.active):hover {
    background: var(--c-accent-light);
    color: var(--c-accent);
  }
  .sec-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--c-text-strong);
    letter-spacing: -0.02em;
  }
  .sec-sub {
    font-size: 12px;
    color: var(--c-muted);
    margin-top: 2px;
  }
  .improve-card {
    border-left: 3px solid var(--c-accent);
    padding: 20px 22px;
    background: var(--c-accent-light);
    border-radius: 0 10px 10px 0;
    transition: background 0.2s;
  }
  .improve-card:hover { background: var(--c-accent-mid); }
  .improve-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--c-accent);
    margin-bottom: 6px;
  }
  .improve-body {
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--c-text);
  }
  .improve-body strong { color: var(--c-text-strong); font-weight: 700; }
  .insight-line {
    font-size: 12.5px;
    color: var(--c-text);
    line-height: 1.5;
    padding: 8px 12px;
    background: var(--c-accent-light);
    border-radius: 6px;
    margin-top: 10px;
  }
  .insight-line::before { content: "📌 "; }
  .fallback-label {
    font-size: 11px;
    color: var(--c-muted);
    margin-top: 6px;
    text-align: right;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  .chart-wrap { position: relative; width: 100%; }
</style>
</head>
<body>

<main class="max-w-[1100px] mx-auto px-6 py-10">

  <header class="flex justify-between items-end mb-10 fade-up">
    <div>
      <p class="text-xs tracking-widest uppercase text-gray-400 mb-1">Weekly Auto-Report</p>
      <h1 class="text-[26px] font-extrabold tracking-tight" style="color:var(--c-text-strong)">
        VOC 대시보드
      </h1>
      <p class="text-sm mt-1" style="color:var(--c-muted)">
        고객의 소리 자동 분류 · 분석 · 개선안 도출
      </p>
    </div>
    <div class="text-right">
      <div class="text-xs" style="color:var(--c-muted)">총 분류</div>
      <span id="totalCount" class="text-2xl font-bold" style="color:var(--c-accent)">--</span>
      <span class="text-sm" style="color:var(--c-muted)">건</span>
    </div>
  </header>

  <div id="loading" class="text-center py-24" style="color:var(--c-muted)">
    <svg class="animate-spin mx-auto mb-3" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
    데이터를 불러오고 있습니다…
  </div>
  <div id="error" class="hidden text-center py-24 text-red-400 text-sm"></div>

  <div id="content" class="hidden space-y-8">

    <section class="card fade-up">
      <div class="flex justify-between items-center mb-5">
        <div>
          <h2 class="sec-title">VOC 유입 추이</h2>
          <p class="sec-sub" id="trendSub">기간별 VOC 접수 건수</p>
        </div>
        <div class="flex gap-1" id="periodTabs">
          <button data-p="day"  class="period-btn active">일별</button>
          <button data-p="week" class="period-btn">주별</button>
          <button data-p="month" class="period-btn">월별</button>
        </div>
      </div>
      <div class="chart-wrap" style="height:280px">
        <canvas id="trendChart"></canvas>
      </div>
      <div id="trendFallback" class="fallback-label hidden"></div>
    </section>

    <div class="space-y-6">

      <section class="card fade-up">
        <h2 class="sec-title mb-1">브리핑</h2>
        <p class="sec-sub mb-5">문의 유형 · 클래스 · 반 · 멘토별 VOC 분포</p>
        <div style="display:flex;flex-direction:column;gap:31px" id="briefingArea"></div>
      </section>

      <section class="card fade-up">
        <h2 class="sec-title mb-1">개선안 아이디어</h2>
        <p class="sec-sub mb-5"></p>
        <div id="improveList" class="space-y-5"></div>
      </section>

    </div>
  </div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzwiIAXNT7ImJxngRbWT-HO3Rd_sxxTgG1exKtW8Q2THy0_D4_GFO1XCi20aDR8je9Www/exec";

let allData = null;
let currentPeriod = "day";
let trendChart = null;
let briefingCharts = [];

/* ── helpers ── */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function sortAsc(keys) {
  return [...keys].sort((a, b) => a.localeCompare(b));
}

function fmtLabelParts(key, period) {
  if (period === "day") {
    const d = new Date(key);
    if (!isNaN(d)) {
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return ['', `${hh}:${mi}`];
    }
    if (/^\d{2}:\d{2}/.test(key)) return ['', key.slice(0,5)];
    return [key.replace(/-/g,'.'), ''];
  }
  if (period === "week") {
    const wMatch = key.match(/^(\d{4})-W(\d+)$/);
    if (wMatch) {
      const yr = wMatch[1];
      const wn = parseInt(wMatch[2], 10);
      const approxMonth = Math.min(12, Math.ceil(wn * 7 / 30.44));
      const weekInMonth = Math.max(1, Math.ceil(wn - (approxMonth-1)*4.35));
      return [yr, `${approxMonth}월 ${weekInMonth}주차`];
    }
    const d2 = new Date(key);
    if (!isNaN(d2)) {
      const m = d2.getMonth() + 1;
      const weekOfMonth = Math.ceil(d2.getDate() / 7);
      return [String(d2.getFullYear()), `${m}월 ${weekOfMonth}주차`];
    }
    return [key, ''];
  }
  if (period === "month") {
    const mMatch = key.match(/^(\d{4})-(\d{2})$/);
    if (mMatch) return [mMatch[1] + '.', `${parseInt(mMatch[2],10)}월`];
    const d3 = new Date(key);
    if (!isNaN(d3)) return [d3.getFullYear() + '.', `${d3.getMonth()+1}월`];
    return [key, ''];
  }
  return [key, ''];
}

function fmtLabel(key, period) {
  const [a, b] = fmtLabelParts(key, period);
  if (!a && b) return [b];
  if (a && b) return [a, b];
  return [a || key];
}

const BLUE  = '#3b82f6';
const BLUE_LIGHT = 'rgba(59,130,246,0.10)';
const BLUE_MID   = 'rgba(59,130,246,0.55)';

/* ── Bold X-axis plugin (shared) ── */
const boldXPlugin = {
  id: 'boldXLine',
  afterDraw(chart) {
    const xAxis = chart.scales.x;
    if (!xAxis) return;
    const c = chart.ctx;
    const labelArr = chart.data.labels;
    const tickCount = xAxis.ticks.length;
    const maxVisible = Math.floor(chart.width / 70);
    const skip = tickCount > maxVisible ? Math.ceil(tickCount / maxVisible) : 1;
    const period = chart.config._period || 'day';

    xAxis.ticks.forEach((tick, i) => {
      if (i % skip !== 0) return;
      const label = labelArr[tick.value != null ? tick.value : i];
      if (!label) return;
      const x = xAxis.getPixelForTick(i);
      const yBase = xAxis.bottom + 12;
      c.save();
      c.textAlign = 'center';
      if (Array.isArray(label) && label.length >= 2) {
        c.fillStyle = '#aaa';
        c.font = '10px Pretendard';
        c.fillText(label[0], x, yBase);
        c.font = 'bold 10px Pretendard';
        c.fillStyle = '#1a1a1a';
        c.fillText(label[1], x, yBase + 14);
      } else {
        const txt = Array.isArray(label) ? label[0] : label;
        if (period === 'day') {
          c.font = 'bold 10px Pretendard';
          c.fillStyle = '#1a1a1a';
        } else {
          c.font = '10px Pretendard';
          c.fillStyle = '#aaa';
        }
        c.fillText(txt, x, yBase);
      }
      c.restore();
    });
  }
};

/* ── trend chart ── */
function drawTrend() {
  const fallbackEl = document.getElementById("trendFallback");
  fallbackEl.classList.add("hidden");
  fallbackEl.textContent = "";

  let keys, counts, labels;

  if (currentPeriod === "day") {
    const dayData = allData.byPeriod.day;
    const allDayKeys = sortAsc(Object.keys(dayData));
    const today = todayStr();

    function getEntriesForDate(prefix) {
      return allDayKeys.filter(k => k.startsWith(prefix));
    }

    let useKeys = getEntriesForDate(today);
    let usedFallback = false;
    let fallbackDate = "";

    if (useKeys.length === 0) {
      const datePrefixes = [...new Set(allDayKeys.map(k => k.slice(0,10)))];
      const sorted = sortAsc(datePrefixes);
      if (sorted.length > 0) {
        fallbackDate = sorted[sorted.length - 1];
        useKeys = getEntriesForDate(fallbackDate);
        usedFallback = true;
      }
    }
    if (useKeys.length === 0) useKeys = allDayKeys;

    keys = sortAsc(useKeys);
    counts = keys.map(k => dayData[k].total);
    labels = keys.map(k => fmtLabel(k, "day"));

    if (usedFallback && fallbackDate) {
      fallbackEl.classList.remove("hidden");
      fallbackEl.textContent = `표시 기준: ${fallbackDate} (today 데이터 없음)`;
    }
  } else {
    const periodData = allData.byPeriod[currentPeriod];
    keys = sortAsc(Object.keys(periodData));
    counts = keys.map(k => periodData[k].total);
    labels = keys.map(k => fmtLabel(k, currentPeriod));
  }

  if (trendChart) trendChart.destroy();
  const ctx = document.getElementById("trendChart").getContext("2d");

  const chartConfig = {
    type: currentPeriod === "day" ? "line" : "bar",
    data: {
      labels,
      datasets: [{
        label: "VOC 건수",
        data: counts,
        borderColor: BLUE,
        backgroundColor: currentPeriod === "day" ? BLUE_LIGHT : BLUE_MID,
        fill: currentPeriod === "day",
        tension: 0.35,
        borderWidth: 2,
        borderRadius: currentPeriod !== "day" ? 6 : 0,
        pointRadius: currentPeriod === "day" ? 3 : 0,
        pointBackgroundColor: BLUE,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { bottom: 28 } },
      scales: {
        x: { grid: { display: false }, ticks: { display: false } },
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 }, color: '#bbb' }, grid: { color: '#f5f5f5' } }
      },
      plugins: { legend: { display: false } }
    },
    plugins: [boldXPlugin]
  };
  chartConfig._period = currentPeriod;
  trendChart = new Chart(ctx, chartConfig);
}

/* ── briefing ── */
function renderBriefing() {
  const container = document.getElementById("briefingArea");
  container.innerHTML = "";
  briefingCharts.forEach(c => c.destroy());
  briefingCharts = [];

  /*
    Data sources:
    - category → briefing.category.counts OR aggregate from byPeriod[].categories
    - class    → allData.byClass  [[name, count], ...]
    - ban      → allData.byBan    [[name, count], ...]
    - mentor   → allData.byMentor [[name, count], ...]
  */
  const dims = [
    { key: "category", label: "VOC 유형별", arrayKey: null,       type: "horizontal-bar" },
    { key: "class",    label: "클래스별",    arrayKey: "byClass",  type: "horizontal-bar" },
    { key: "ban",      label: "반별",        arrayKey: "byBan",    type: "bar" },
    { key: "mentor",   label: "멘토별",      arrayKey: "byMentor", type: "horizontal-bar" },
  ];

  const briefing = allData.briefing || null;
  const periodData = allData.byPeriod[currentPeriod];
  const dateKeys = sortAsc(Object.keys(periodData));

  dims.forEach((dim, idx) => {
    const wrapper = document.createElement("div");
    let items = {};
    let insightText = "";

    // 1) Top-level array (byClass / byBan / byMentor)
    if (dim.arrayKey && Array.isArray(allData[dim.arrayKey]) && allData[dim.arrayKey].length > 0) {
      allData[dim.arrayKey].forEach(entry => {
        items[entry[0]] = (items[entry[0]] || 0) + entry[1];
      });
    }
    // 2) briefing object
    else if (briefing && briefing[dim.key]) {
      items = { ...(briefing[dim.key].counts || {}) };
      insightText = briefing[dim.key].insight || "";
    }
    // 3) Aggregate from byPeriod categories (category only)
    else if (dim.key === "category") {
      dateKeys.forEach(dk => {
        const cats = periodData[dk].categories;
        if (cats) Object.entries(cats).forEach(([c, n]) => { items[c] = (items[c]||0) + n; });
      });
    }
    // 4) topKeywords fallback
    if (Object.keys(items).length === 0 && allData.topKeywords) {
      allData.topKeywords.slice(idx*3, idx*3+4).forEach(([kw,n]) => { items[kw]=n; });
    }

    const labels = Object.keys(items);
    const values = Object.values(items);
    if (labels.length === 0) return;

    const maxVal = Math.max(...values);
    const maxIdx = values.indexOf(maxVal);
    const maxLabel = labels[maxIdx];

    if (!insightText) {
      insightText = `<strong>${dim.label} 기준, '${maxLabel}'이(가) ${maxVal}건으로 가장 높은 비중을 차지합니다.</strong>`;
    } else {
      insightText = `<strong>${insightText}</strong>`;
    }

    const isH = dim.type === "horizontal-bar";
    const canvasH = Math.max(100, labels.length * 28 + 20);

    wrapper.innerHTML = `
      <div class="text-xs font-semibold mb-2" style="color:var(--c-text-strong)">${dim.label}</div>
      <div class="chart-wrap" style="height:${isH ? canvasH : 120}px">
        <canvas id="briefChart${idx}"></canvas>
      </div>
      ${insightText ? `<div class="insight-line">${insightText}</div>` : ''}
    `;
    container.appendChild(wrapper);

    const bgColors = values.map((v,i) => i === maxIdx ? BLUE : BLUE_MID);
    const c = new Chart(document.getElementById(`briefChart${idx}`).getContext("2d"), {
      type: "bar",
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: bgColors, borderRadius: 4, barThickness: isH?14:undefined, maxBarThickness: 22 }]
      },
      options: {
        indexAxis: isH ? "y" : "x",
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { beginAtZero: true, grid: { color:'#f5f5f5' }, ticks: { font:{size:10,family:'Pretendard'}, color:'#aaa', stepSize:1 } },
          y: { grid: { display: false }, ticks: { font:{size:11,family:'Pretendard'}, color:'#666' } }
        }
      }
    });
    briefingCharts.push(c);
  });
}

/* ── 개선안 ── */
function renderImprovements() {
  const el = document.getElementById("improveList");
  const hints = allData.topHints || [];
  const items = hints.slice(0, 3);

  if (items.length === 0) {
    el.innerHTML = '<p class="text-sm text-gray-400">개선안 데이터가 없습니다.</p>';
    return;
  }

  el.innerHTML = items.map((h, i) => {
    const hintRaw = h.hint || "";
    const hintText = hintRaw
      .replace(/\n\s*/g, '')
      .replace(/(②|③|④|⑤)/g, '<br style="display:block;margin-top:6px;">$1');

    const periodData = allData.byPeriod[currentPeriod];
    const dateKeys = Object.keys(periodData).sort();
    let catCount = 0;
    dateKeys.forEach(dk => {
      const cats = periodData[dk].categories;
      if (cats && cats[h.category]) catCount += cats[h.category];
    });
    const pct = allData.totalCount > 0 ? Math.round(catCount / allData.totalCount * 100) : 0;

    const currentStatus = catCount > 0
      ? `'${h.category}' 관련 VOC ${catCount}건 (전체 ${pct}%) 접수.`
      : `'${h.category}' 관련 반복 문의가 지속적으로 발생하고 있습니다.`;

    const effectiveness = `해당 개선을 통해 '${h.category}' 유형의 VOC를 선제적으로 줄여, 운영 리스크를 낮추고 교육 품질 안정성을 확보할 수 있습니다.`;

    return `
      <div class="improve-card">
        <div class="improve-label">개선안 ${i+1}</div>
        <div class="improve-body">
          <div class="mb-2">
            <strong>현황</strong><br>
            ${currentStatus}
          </div>
          <div class="mb-2">
            <strong>개선안</strong><br>
            ${hintText}
          </div>
          <div>
            <strong>기대 효과</strong><br>
            ${effectiveness}
          </div>
        </div>
      </div>
    `;
  }).join("");
}

/* ── period tab toggle ── */
document.getElementById("periodTabs").addEventListener("click", (e) => {
  const btn = e.target.closest(".period-btn");
  if (!btn || !btn.dataset.p) return;
  currentPeriod = btn.dataset.p;
  document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  drawTrend();
  renderBriefing();
});

/* ── sample data (fallback for claude.ai preview) ── */
function getSampleData() {
  const days = {};
  const todayPrefix = todayStr();
  [9,10,11,13,14,15,16,17].forEach(h => {
    const key = `${todayPrefix}T${String(h).padStart(2,'0')}:00:00`;
    const total = Math.floor(Math.random()*5)+1;
    days[key] = {
      total,
      categories: {
        "수강 신청/결제": Math.max(1, Math.floor(total*0.3)),
        "클래스 운영": Math.floor(total*0.25),
        "콘텐츠 오류": Math.floor(total*0.2),
        "시스템 장애": Math.floor(total*0.15),
        "기타": Math.max(1, Math.ceil(total*0.1)),
      }
    };
  });

  const weeks = {};
  ["2025-W27","2025-W28","2025-W29","2025-W30"].forEach((w,i) => {
    const total = [34,41,28,37][i];
    weeks[w] = { total, categories: { "수강 신청/결제":Math.floor(total*0.28), "클래스 운영":Math.floor(total*0.22), "콘텐츠 오류":Math.floor(total*0.18), "시스템 장애":Math.floor(total*0.15), "멘토링 불만":Math.floor(total*0.1), "기타":Math.ceil(total*0.07) } };
  });

  const months = {};
  ["2025-04","2025-05","2025-06","2025-07"].forEach((m,i) => {
    const total = [98,127,112,140][i];
    months[m] = { total, categories: { "수강 신청/결제":Math.floor(total*0.28), "클래스 운영":Math.floor(total*0.22), "콘텐츠 오류":Math.floor(total*0.18), "시스템 장애":Math.floor(total*0.15), "멘토링 불만":Math.floor(total*0.1), "기타":Math.ceil(total*0.07) } };
  });

  return {
    totalCount: 140,
    byPeriod: { day: days, week: weeks, month: months },
    byClass: [["클래스_A",42],["클래스_B",33],["클래스_C",28],["클래스_D",22],["클래스_E",15]],
    byBan:   [["A-1",38],["A-2",35],["B-1",31],["B-2",22],["C-1",14]],

async function loadData() {

    allData = await res.json();
    if (allData.error) throw new Error(allData.error);
  } catch (err) {
    console.warn("API 호출 실패, 샘플 데이터로 대체합니다:", err.message);
    allData = getSampleData();
  }

  document.getElementById("loading").classList.add("hidden");
  document.getElementById("content").classList.remove("hidden");
  document.getElementById("totalCount").textContent = allData.totalCount;

  drawTrend();
  renderBriefing();
  renderImprovements();
}
